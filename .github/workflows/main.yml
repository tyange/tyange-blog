name: Deploy Nuxt to Lightsail

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [cms-content-changed]
  workflow_dispatch:
    inputs:
      content_event:
        description: CMS content event type
        required: false
        default: manual
      post_id:
        description: Post identifier
        required: false
      visibility:
        description: Visible or hidden content
        required: false
        default: visible

concurrency:
  group: tyange-blog-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deploy on aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Log trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_action=${{ github.event.action || '' }}"
          echo "github.event.client_payload.source=${{ github.event.client_payload.source || 'github' }}"
          echo "github.event.client_payload.content_event=${{ github.event.client_payload.content_event || inputs.content_event || 'unknown' }}"
          echo "github.event.client_payload.post_id=${{ github.event.client_payload.post_id || inputs.post_id || '' }}"
          echo "github.event.client_payload.visibility=${{ github.event.client_payload.visibility || inputs.visibility || '' }}"

      - name: Generate static site
        run: bun run generate
        env:
          NUXT_PUBLIC_TYANGE_CMS_API_BASE: ${{ vars.API_BASE }}

      - name: Deploy static files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          source: '.output/public/'
          target: ${{ vars.DEPLOY_PATH }}
          strip_components: 2
          debug: true
          rm: true

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
